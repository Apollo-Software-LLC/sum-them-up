<!DOCTYPE html>
<html>
<head>
    <title>Sum Them Up!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            min-width: max-content !important;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 0.95rem;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Sum Them Up!</h1>
    
    <p id="info"></p>
    <p id="result"></p>
    
    <button id="copy">Copy to Clipboard</button>
    
    <script src="popup.js"></script>
</body>
</html>
